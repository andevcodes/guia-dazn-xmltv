name: Actualizar EPG DAZN + dobleM

on:
  schedule:
    # Cuatro veces al dia (UTC), un poco despues de las actualizaciones de dobleM
    - cron: '30 7,11,15,19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python dazn_doblem_merge.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add guide.xml
          git commit -m "Actualizar EPG" || echo "Sin cambios"
          git push
